name: Update PSX prices

on:
  # Every 15 minutes, 04:00–10:59 UTC ≈ 09:00–15:59 PKT, Monday–Friday
  schedule:
    - cron: "*/15 4-10 * * 1-5"
  # Lets you run it manually from the Actions tab (great for testing)
  workflow_dispatch: {}

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch prices and push to Firebase
        run: python update_prices.py
